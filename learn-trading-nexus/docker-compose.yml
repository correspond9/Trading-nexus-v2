version: '3.8'

services:
  learn-trading-nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learn-trading-nexus
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=https://tradingnexus.pro/api/v2
      - NEXT_PUBLIC_PORTAL_API_TOKEN=portal-signups-token
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

      start_period: 10s
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.learn-trading-nexus.rule=Host('learn.tradingnexus.pro')"
      - "traefik.http.routers.learn-trading-nexus.entrypoints=websecure"
      - "traefik.http.routers.learn-trading-nexus.tls.certresolver=letsencrypt"
      - "traefik.http.services.learn-trading-nexus.loadbalancer.server.port=3000"

networks:
  traefik:
    external: false
    driver: bridge
